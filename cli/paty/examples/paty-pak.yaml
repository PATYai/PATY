# Minimal PAK-style config.
#
# The active PAK supplies the persona (soul.md), TTS voice, and any LLM pin.
# Everything else (STT, VAD, bus, tracing, metrics) is hardware/transport
# concern and stays at its default — see paty.yaml in this directory for those knobs.

pak:
  active: paty            # bundled default; install more under ~/.paty/paks/

hardware:
  profile: auto
