agent:
  name: paty
  persona: "You are PATY, a friendly personal assistant. You're warm, helpful, and concise."

pipeline:
  stt: whisper
  llm: ollama
  tts: kokoro
  vad: silero

hardware:
  profile: auto

tracing:
  enabled: true
  console: true

metrics:
  enabled: true
  console_interval: 10   # seconds between Rich table prints (0 to disable)
  prometheus: false       # set true + install paty[prometheus] for :9464/metrics
