# Example: PAK-style config (recommended).
# The active PAK provides the persona (soul.md) and TTS voice; the legacy
# `agent.persona` block is no longer required and is mutually exclusive
# with `pak.active`.

pak:
  active: paty            # name of an installed PAK; the bundled default is "paty"

pipeline:
  stt: whisper
  llm: ollama
  vad: silero
  # tts/llm here would override what the PAK declares — leave unset to use the PAK's voice.

hardware:
  profile: auto

tracing:
  enabled: true
  console: true

metrics:
  enabled: true
  console_interval: 10
  prometheus: false

bus:
  enabled: true
  host: 127.0.0.1
  port: 8765
