app = "paty-web"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    NEXT_PUBLIC_MCP_SERVER_URL = "https://paty-stage-mcp.fly.dev"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
