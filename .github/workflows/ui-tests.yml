name: UI Tests

on:
  push:
    branches: [main]
    paths:
      - "mcp/ui/**"
  pull_request:
    paths:
      - "mcp/ui/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp/ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mcp/ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npm test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: mcp/ui/playwright-report/
          retention-days: 7
