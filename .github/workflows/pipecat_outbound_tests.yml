name: PATY Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    paths:
      - 'agent/**'
      - 'pipecat_outbound/**'
      - 'tests/**'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v1
      with:
        version: "latest"

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: uv sync --all-extras
        
    - name: Lint with Ruff
      run: uv run ruff check .
        
    - name: Run Unit Tests
      env:
        PYTHONPATH: .
      run: uv run pytest tests/unit

    - name: Run HTTP Tests
      env:
        PYTHONPATH: .
      run: uv run pytest tests/http -v

    - name: Run Simulator Tests (Transcript Level)
      if: env.OPENAI_API_KEY != ''
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        PYTHONPATH: .
      run: uv run pytest tests/simulator -m "not waveform" -v

    - name: Run Smoke Tests (Optional)
      if: env.DAILY_API_KEY != ''
      env:
        DAILY_API_KEY: ${{ secrets.DAILY_API_KEY }}
        PYTHONPATH: .
      run: uv run pytest tests/smoke

  waveform:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v1
      with:
        version: "latest"

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Run Simulator Tests (Waveform Level)
      if: env.OPENAI_API_KEY != ''
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        PYTHONPATH: .
      run: uv run pytest tests/simulator -m "waveform" -v
