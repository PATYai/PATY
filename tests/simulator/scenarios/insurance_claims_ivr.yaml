name: "Insurance Company - Reach Claims Agent"
type: ivr
initial_greeting: "Thank you for calling Acme Insurance. For claims, press 1 or say claims. For billing, press 2. For all other inquiries, press 3."
initial_state: main_menu

states:
  main_menu:
    prompt: "For claims, press 1 or say claims. For billing, press 2. For all other inquiries, press 3."
    transitions:
      - match: "claims|one|1"
        next: claims_menu
      - match: "billing|two|2"
        next: billing_menu
      - match: "other|three|3"
        next: other_menu

  claims_menu:
    prompt: "For auto claims, press 1. For home claims, press 2. To speak with an agent, press 0."
    transitions:
      - match: "auto|one|1"
        next: auto_claims
      - match: "home|two|2"
        next: home_claims
      - match: "agent|operator|zero|0|speak|representative"
        next: hold_for_agent

  auto_claims:
    prompt: "To file a new auto claim, press 1. To check an existing claim, press 2. To speak with an agent, press 0."
    transitions:
      - match: "new|file|one|1"
        next: hold_for_agent
      - match: "existing|check|two|2|status"
        next: hold_for_agent
      - match: "agent|operator|zero|0|speak|representative"
        next: hold_for_agent

  home_claims:
    prompt: "To file a new home claim, press 1. To check an existing claim, press 2. To speak with an agent, press 0."
    transitions:
      - match: "new|file|one|1"
        next: hold_for_agent
      - match: "existing|check|two|2|status"
        next: hold_for_agent
      - match: "agent|operator|zero|0|speak|representative"
        next: hold_for_agent

  billing_menu:
    prompt: "For payment information, press 1. To speak with a billing representative, press 0."
    transitions:
      - match: "payment|one|1"
        next: hold_for_agent
      - match: "representative|agent|zero|0|speak"
        next: hold_for_agent

  other_menu:
    prompt: "Please hold while I transfer you to a representative."
    terminal: true
    transfer: true

  hold_for_agent:
    prompt: "Please hold while I transfer you to the next available agent."
    terminal: true
    transfer: true

bot_config:
  target_who: "Acme Insurance"
  goal: "Navigate to the claims department and reach a live agent to file a new auto insurance claim"

assertions:
  - type: reached_state
    state: hold_for_agent
  - type: transcript_contains
    role: assistant
    pattern: "claim|auto"
  - type: max_turns
    value: 8
