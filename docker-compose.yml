services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    ports:
      - "8080:8080"
    env_file:
      - .env.local
    environment:
      PORT: "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mcp:
    build:
      context: mcp
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    env_file:
      - .env.local
    environment:
      PORT: "8080"
      BOT_SERVICE_URL: "http://bot:8080"
    depends_on:
      bot:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: web
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    environment:
      PORT: "8080"
      NEXT_PUBLIC_MCP_SERVER_URL: "http://localhost:8081"
    env_file:
      - path: web/.env.local
        required: false
    depends_on:
      - mcp
